<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 580px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
            position: relative;
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .lang-bar {
            position: absolute;
            top: 12px; right: 12px;
            display: flex; gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 200px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn.active { background: white; color: #667eea; font-weight: 600; }
        .content { padding: 28px 26px; }
        .input-field {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
            background: white;
        }
        .input-field:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .input-field::placeholder { color: #999; }
        .question { margin-bottom: 24px; }
        .question-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .question-icon { font-size: 22px; }
        .star-rating { display: flex; gap: 6px; justify-content: center; }
        .star {
            font-size: 38px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ddd;
            filter: grayscale(100%);
            user-select: none;
        }
        .star:hover { transform: scale(1.15); filter: grayscale(0%); }
        .star.active { filter: grayscale(0%); transform: scale(1.05); }
        .comment-box {
            width: 100%;
            min-height: 90px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        .comment-box:focus { outline: none; border-color: #667eea; }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .error-message {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            display: none;
            font-size: 14px;
        }
        .error-message.show { display: block; }
        .success-message { display: none; text-align: center; padding: 50px 20px; }
        .success-message.show { display: block; }
        .success-message .success-icon { font-size: 70px; margin-bottom: 16px; }
        .success-message h2 { color: #10b981; font-size: 24px; margin-bottom: 12px; }
        .success-message p { color: #666; font-size: 15px; line-height: 1.6; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 36px; height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 560px) {
            .star { font-size: 32px; }
            .content { padding: 22px 18px; }
            .header { padding: 40px 20px 24px; }
            .lang-bar { top: 8px; right: 8px; max-width: 170px; }
        }
    </style>
</head>

let CURRENT_FORM = null; // { id, name, slug, icon, description }

async function loadQuestions(formSlug) {
    try {
        let query;
        if (formSlug && formSlug !== 'default') {
            // Önce formu bul
            const { data: formData, error: formErr } = await supabase
                .from('survey_forms')
                .select('*')
                .eq('slug', formSlug)
                .maybeSingle();
            if (formErr) throw formErr;
            CURRENT_FORM = formData;

            if (CURRENT_FORM) {
                // Bu forma ait sorular
                const { data, error } = await supabase
                    .from('survey_questions')
                    .select('*')
                    .eq('form_id', CURRENT_FORM.id)
                    .eq('is_active', true)
                    .order('sort_order', { ascending: true });
                if (error) throw error;
                QUESTIONS_DB = data || [];
            }
        } else {
            // Varsayılan: form_id NULL olan sorular (eski oda anketi)
            const { data, error } = await supabase
                .from('survey_questions')
                .select('*')
                .is('form_id', null)
                .eq('is_active', true)
                .order('sort_order', { ascending: true });
            if (error) throw error;
            QUESTIONS_DB = data || [];
        }
        console.log('✅ Sorular yüklendi:', QUESTIONS_DB.length, CURRENT_FORM?.name||'varsayılan');
    } catch (e) {
        console.error('❌ Soru yükleme hatası:', e);
        QUESTIONS_DB = [];
    }
}

// ─── DETECT LANGUAGE ──────────────────────────────────────────
function detectLang() {
    const url = new URLSearchParams(window.location.search);
    if (url.get('lang') && LANGS[url.get('lang')]) return url.get('lang');
    const b = (navigator.language || 'tr').split('-')[0].toLowerCase();
    return LANGS[b] ? b : 'tr';
}

// ─── RENDER LANG BAR ──────────────────────────────────────────
function renderLangBar() {
    document.getElementById('langBar').innerHTML = Object.keys(LANGS).map(c =>
        `<button class="lang-btn ${c===currentLang?'active':''}" onclick="setLang('${c}')">${LANGS[c].name}</button>`
    ).join('');
}

// ─── SET LANGUAGE ─────────────────────────────────────────────
function setLang(code) {
    currentLang = code;
    const L = LANGS[code];
    document.documentElement.lang = code;
    document.getElementById('titleText').textContent     = L.title;
    document.getElementById('subtitleText').textContent  = L.subtitle;
    document.getElementById('labelRoom').textContent     = L.labelRoom;
    document.getElementById('labelEmail').textContent    = L.labelEmail;
    document.getElementById('labelComments').textContent = L.labelComments;
    document.getElementById('submitBtn').textContent     = L.btnSubmit;
    document.getElementById('successTitle').textContent  = L.successTitle;
    document.getElementById('successBody').textContent   = L.successBody;
    document.getElementById('successFooter').textContent = L.successFooter;
    renderLangBar();
    renderDeptQuestions();
}
window.setLang = setLang;

// ─── RENDER DEPT QUESTIONS ────────────────────────────────────
function renderDeptQuestions() {
    const L = LANGS[currentLang];
    const depts = L.getDepts(); // DB'den al
    const c = document.getElementById('deptQuestions');
    
    if (!depts.length) {
        c.innerHTML = '<p style="text-align:center;color:#999;padding:30px">Sorular yükleniyor...</p>';
        return;
    }
    
    c.innerHTML = depts.map(d => {
        ratings[d.key] = ratings[d.key] || 0;
        const v = ratings[d.key];
        return `<div class="question">
            <div class="question-title"><span class="question-icon">${d.icon}</span><span>${d.name}</span></div>
            <div class="star-rating" data-dept="${d.key}">
                ${[1,2,3,4,5].map(i=>`<span class="star ${i<=v?'active':''}" data-value="${i}">${i<=v?'⭐':'☆'}</span>`).join('')}
            </div></div>`;
    }).join('');

    c.querySelectorAll('.star-rating').forEach(g => {
        const dept = g.dataset.dept;
        g.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.dataset.value);
                ratings[dept] = val;
                g.querySelectorAll('.star').forEach((s,i) => {
                    s.classList.toggle('active', i < val);
                    s.textContent = i < val ? '⭐' : '☆';
                });
            });
        });
    });
}

// ─── SUBMIT ───────────────────────────────────────────────────
window.submitSurvey = async function() {
    const L = LANGS[currentLang];
    const room  = document.getElementById('roomNumber').value.trim();
    const email = document.getElementById('emailAddress').value.trim();

    if (!room)  return showError(L.errRoom);
    if (!email) return showError(L.errEmail);
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError(L.errEmailFmt);
    if (!Object.values(ratings).some(r => r > 0))   return showError(L.errRating);

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loading').classList.add('show');
    hideError();

    try {
        // Ratings JSON formatında
        const ratingsObj = {};
        QUESTIONS_DB.forEach(q => {
            if (ratings[q.key] && ratings[q.key] > 0) {
                ratingsObj[q.key] = ratings[q.key];
            }
        });

        const payload = {
            room_number: room,
            email: email,
            comments: document.getElementById('comments').value || null,
            ratings: ratingsObj,
            form_id: CURRENT_FORM?.slug || null
        };

        const { error } = await supabase.from('surveys').insert([payload]);
        if (error) throw error;

        document.getElementById('surveyForm').style.display = 'none';
        document.getElementById('successMessage').classList.add('show');
    } catch(e) {
        console.error(e);
        showError(L.errSend);
        btn.disabled = false;
    } finally {
        document.getElementById('loading').classList.remove('show');
    }
}

function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
}
function hideError() { document.getElementById('errorMessage').classList.remove('show'); }

// ─── INIT ─────────────────────────────────────────────────────
(async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const formSlug = urlParams.get('form') || null;
    const room = decodeURIComponent(urlParams.get('oda') || '');

    // Önce formu ve soruları yükle
    await loadQuestions(formSlug);

    // Form başlığını güncelle
    if (CURRENT_FORM) {
        const titleEl = document.getElementById('surveyTitle');
        const subtitleEl = document.getElementById('surveySubtitle');
        if (titleEl) titleEl.textContent = `${CURRENT_FORM.icon||'🍽️'} ${CURRENT_FORM.name}`;
        if (subtitleEl && CURRENT_FORM.description) subtitleEl.textContent = CURRENT_FORM.description;
    }

    if (room) document.getElementById('roomNumber').value = room;

    currentLang = detectLang();
    setLang(currentLang);
})();
</script>
